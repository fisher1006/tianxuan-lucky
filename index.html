<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天选上上签 - 今日运势占卜</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            overflow-x: hidden;
        }
        #stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: var(--min-opacity); transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        .subtitle {
            opacity: 0.8;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #e94560;
        }
        input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .btn {
            padding: 15px 30px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #e94560, #0f3460);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233,69,96,0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            opacity: 0.5;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.3);
        }
        .divider span {
            padding: 0 15px;
            font-size: 0.9rem;
        }
        .error-msg {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        .result-section { display: none; }
        .result-section.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fortune-level {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .level-daji { color: #ffd700; text-shadow: 0 0 30px rgba(255,215,0,0.5); }
        .level-zhongji { color: #87ceeb; }
        .level-xiaoji { color: #90ee90; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stat-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
        }
        .stat-label { font-size: 0.8rem; opacity: 0.8; margin-bottom: 5px; }
        .stat-value { font-size: 1.1rem; font-weight: bold; }
        .poem-section {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }
        .poem-title { font-size: 1.1rem; margin-bottom: 10px; color: #ffd700; }
        .poem-text { font-size: 1rem; line-height: 1.8; }
        .loading {
            display: none;
            padding: 40px;
        }
        .loading.active { display: block; }
        .loading-text { font-size: 1.2rem; margin-bottom: 20px; }
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .loading-dot {
            width: 12px; height: 12px;
            background: #e94560;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }
        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .readings-title {
            font-size: 1.1rem;
            margin: 20px 0 15px;
            color: #ffd700;
        }
        .reading-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: left;
        }
        .reading-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .reading-text { font-size: 0.9rem; opacity: 0.9; line-height: 1.6; }
        .invite-code-display {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        .footer {
            margin-top: 40px;
            opacity: 0.5;
            font-size: 0.8rem;
        }
        @media (max-width: 480px) {
            .container { padding: 20px 15px; }
            h1 { font-size: 1.5rem; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="stars"></div>
    
    <div class="container">
        <!-- 输入页面 -->
        <section id="inputSection">
            <h1>🎋 天选上上签</h1>
            <p class="subtitle">✦ 今日运势占卜 ✦</p>
            
            <div class="card">
                <div class="input-group">
                    <label>邀请码</label>
                    <input type="text" id="inviteCode" placeholder="请输入邀请码" maxlength="20">
                </div>
                <button class="btn btn-primary" id="startBtn" disabled>开启命运之旅</button>
                
                <div class="divider"><span>或</span></div>

        <!-- Loading -->
        <section class="card loading" id="loading">
            <div class="loading-text">宇宙正在为你占卜...</div>
            <div class="loading-dots">
                <div class="loading-dot"></div>

        <!-- 结果页 -->

                <div class="stats-grid">

                <div class="poem-section">

                    <div class="poem-text" id="poem">今日诸事大吉...</div>
                </div>
                
                <div class="readings-title">✦ 详细解读 ✦</div>
                <div class="reading-item">
                    <div class="reading-header">💼 事业</div>
                    <div class="reading-text" id="career">...</div>
                </div>
                <div class="reading-item">
                    <div class="reading-header">💕 爱情</div>
                    <div class="reading-text" id="love">...</div>
                </div>
                <div class="reading-item">
                    <div class="reading-header">❤️ 健康</div>
                    <div class="reading-text" id="health">...</div>
                </div>
                <div class="reading-item">
                    <div class="reading-header">💰 财运</div>
                    <div class="reading-text" id="fortune">...</div>
                </div>
                
                <div class="invite-code-display" id="inviteCodeDisplay"></div>
                
                <button class="btn btn-secondary" onclick="drawFortune()">🔄 再抽一次</button>
            </div>
        </section>
        
        <div class="footer">星辰指引 · 仅供参考 · 娱乐而已</div>
    </div>

    <script>

            {

                poem: "清风徐来送吉祥，祸去福来运渐昌。稳中求进方为上，细水长流福寿长。",
                career: "平稳推进！工作按部就班，适合处理日常事务。沟通能力突出，商务谈判或有收获。",
                love: "渐入佳境！与伴侣相处愉快，误会解除。单身者可能遇到聊得来的对象。",
                health: "基本良好！偶有疲惫感，注意调节。适合瑜伽、冥想等舒缓运动。",

            },
            {

                poem: "黄金铺地照华堂，付出终得报吉祥。审时度势稳步走，好运相随福无疆。",

            {

                poem: "浮云遮日终有时，逆境之后是坦途。稳扎稳打步步营，否极泰来福自至。",
                career: "遇到挑战！工作中可能遭遇困难或变动，但这是成长的机会。保持冷静，寻求解决方案。",

                health: "小心谨慎！注意安全，避免意外伤害。身体偶有不适，及时就医检查。",

            },
            {

                poem: "细水长流缓缓行，中庸之道保平安。知足常乐随遇安，平稳度日赛神仙。",
                career: "按部就班！工作平稳无大波澜，适合处理常规任务。不求有功，但求无过。",
                love: "平淡是真！与伴侣相处如温水，偶有小确幸。单身者桃花运一般。",
                health: "维持良好！身体状态平稳，无大碍。保持现有养生习惯即可。",
                fortune: "收支相抵！收入与支出基本持平，无太多盈余。理财宜稳健。"
            },
            {
                level: "吉", element: "水", zodiac: "双鱼座", tarot: "命运之轮",
                poem: "时来运转各有期，福祸相依莫强求。随缘自适不强求，淡泊明志乐悠悠。",
                career: "等待时机！目前处于积累阶段，不宜冒进。做好准备工作，等待机会降临。",
                love: "随缘自在！不强求，不勉强。单身者享受当下，已婚者珍惜现有。",
                health: "顺其自然！身体没有大问题，保持良好心态最重要。",
                fortune: "静待时机！目前不是最佳投资时机，保持观望态度。"
            },
            {
                level: "末吉", element: "木", zodiac: "射手座", tarot: "倒吊人",
                poem: "船到桥头自然直，风雨之后见彩虹。静心等待时机至，好运自然来相随。",
                career: "调整期！适合沉淀学习，提升专业技能。表面看似停滞，实则是在积累能量。",
                love: "考验期！与伴侣经历小波折后感情更加稳固。单身者可能还在等待阶段。",
                health: "需要休息！身心略有疲惫感，建议适当放松。",
                fortune: "静观其变！投资理财宜保守，不宜冒进。"
            }
        ];

        // ====== 加密工具 ======
        function base64Encode(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }
        
        function base64Decode(str) {
            return decodeURIComponent(escape(atob(str)));
        }
        
        // 简单签名（实际生产可用 HMAC）
        function sign(data) {
            let hash = 0;
            const str = data + SECRET_KEY;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }
        
        // 生成邀请码
        function generateInviteCode(tool, maxUses = 1, expiresDays = 7) {
            const data = {
                tool: tool,
                maxUses: maxUses,
                created: Date.now(),
                expires: Date.now() + expiresDays * 24 * 60 * 60 * 1000,
                nonce: Math.random().toString(36).substr(2, 9)
            };
            const json = JSON.stringify(data);
            const encoded = base64Encode(json);
            const signature = sign(json);
            return encoded + '.' + signature;
        }
        
        // 解析邀请码
        function parseInviteCode(code) {
            try {
                const parts = code.split('.');
                if (parts.length !== 2) return null;
                
                const json = base64Decode(parts[0]);
                const signature = sign(json);
                
                if (signature !== parts[1]) {
                    console.error('签名验证失败');
                    return null;
                }
                
                const data = JSON.parse(json);
                
                // 检查过期
                if (data.expires && Date.now() > data.expires) {
                    return { error: '邀请码已过期' };
                }
                
                return data;
            } catch (e) {
                console.error('解析失败:', e);
                return null;
            }
        }

        // ====== 页面初始化 ======
        function generateStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--min-opacity', Math.random() * 0.3 + 0.2);
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }

        // ====== 事件处理 ======
        document.getElementById('inviteCode').addEventListener('input', function() {
            document.getElementById('startBtn').disabled = this.value.length < 10;
            document.getElementById('errorMsg').textContent = '';
        });

        document.getElementById('startBtn').addEventListener('click', function() {
            const code = document.getElementById('inviteCode').value.trim();
            const result = parseInviteCode(code);
            
            if (!result) {
                document.getElementById('errorMsg').textContent = '邀请码无效';
                return;
            }
            
            if (result.error) {
                document.getElementById('errorMsg').textContent = result.error;
                return;
            }
            
            // 验证通过，保存到 localStorage
            localStorage.setItem('tianxuan_invite_code', code);
            
            showLoading();
            setTimeout(() => {
                const fortune = getRandomFortune();
                showResult(fortune, code);
            }, 1500);
        });

        document.getElementById('drawBtn').addEventListener('click', drawFortune);

        function drawFortune() {
            showLoading();
            
            setTimeout(() => {
                // 生成新的邀请码（限制使用次数）
                const code = generateInviteCode('tianxuan', 3, 7);
                localStorage.setItem('tianxuan_invite_code', code);
                
                const fortune = getRandomFortune();
                showResult(fortune, code);
            }, 2000);
        }

        function getRandomFortune() {
            const index = Math.floor(Math.random() * fortunes.length);
            return fortunes[index];
        }

        function showLoading() {
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('resultSection').classList.remove('active');
            document.getElementById('loading').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }

        function showResult(fortune, inviteCode) {
            // 显示运势
            document.getElementById('levelBadge').textContent = fortune.level;
            document.getElementById('levelBadge').className = 'level-badge';
            if (fortune.level === '大吉') document.getElementById('levelBadge').classList.add('level-daji');
            else if (fortune.level === '中吉') document.getElementById('levelBadge').classList.add('level-zhongji');
            else document.getElementById('levelBadge').classList.add('level-xiaoji');
            
            document.getElementById('element').textContent = fortune.element;
            document.getElementById('zodiac').textContent = fortune.zodiac;
            document.getElementById('matchRate').textContent = (95 + Math.random() * 5).toFixed(1) + '%';
            document.getElementById('poem').textContent = fortune.poem;
            document.getElementById('career').textContent = fortune.career;
            document.getElementById('love').textContent = fortune.love;
            document.getElementById('health').textContent = fortune.health;
            document.getElementById('fortune').textContent = fortune.fortune;
            
            // 显示邀请码（不含签名，更简洁）
            const codeData = parseInviteCode(inviteCode);
            const displayCode = inviteCode.split('.')[0].substring(0, 12) + '...';
            document.getElementById('inviteCodeDisplay').textContent = '邀请码: ' + displayCode;
            
            hideLoading();
            document.getElementById('resultSection').classList.add('active');
        }

        // 检查 URL 参数
        function checkUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if (code) {
                document.getElementById('inviteCode').value = code;
                document.getElementById('startBtn').disabled = false;
            }
        }

        // 初始化
        generateStars();
        checkUrlParams();
    </script>
</body>
</html>
