        function sign(data) {
            let hash = 0;
            const str = data + SECRET_KEY;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }
        
        // 生成邀请码（支持有效期）
        function generateInviteCode(tool, maxUses = 1, expiresDays = 7) {
            const data = {
                tool: tool,
                maxUses: maxUses,
                created: Date.now(),
                expires: Date.now() + expiresDays * 24 * 60 * 60 * 1000,
                nonce: Math.random().toString(36).substr(2, 9)
            };
            const json = JSON.stringify(data);
            const encoded = base64Encode(json);
            const signature = sign(json);
            return encoded + '.' + signature;
        }
        
        // 解析邀请码
        function parseInviteCode(code) {
            try {
                const parts = code.split('.');
                if (parts.length !== 2) return null;
                const json = base64Decode(parts[0]);
                const signature = sign(json);
                if (signature !== parts[1]) return null;
                const data = JSON.parse(json);
                if (data.expires && Date.now() > data.expires) {
                    return { error: '邀请码已过期' };
                }
                return data;
            } catch (e) { return null; }
        }

        // ====== 页面初始化 ======
        function generateStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--min-opacity', Math.random() * 0.3 + 0.2);
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }

        // ====== 事件处理 ======
        document.getElementById('drawBtn').addEventListener('click', drawFortune);

        function drawFortune() {
            showLoading();
            setTimeout(() => {
                const fortune = getRandomFortune();
                showResult(fortune);
            }, 2000);
        }

        function getRandomFortune() {
            const index = Math.floor(Math.random() * fortunes.length);
            return fortunes[index];
        }

        function showLoading() {
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('resultSection').classList.remove('active');
            document.getElementById('loading').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }

        function showResult(fortune) {
            // 设置运势等级
            const levelBadge = document.getElementById('levelBadge');
            levelBadge.textContent = fortune.level;
            levelBadge.className = 'fortune-level';
            if (fortune.level === '大吉') levelBadge.classList.add('level-daji');
            else if (fortune.level === '中吉') levelBadge.classList.add('level-zhongji');
            else levelBadge.classList.add('level-xiaoji');
            
            // 设置 tarot 卡牌
            document.getElementById('tarotSymbol').textContent = fortune.tarotSymbol;
            document.getElementById('tarotName').textContent = fortune.tarot;
            
            // 设置统计数据
            document.getElementById('element').textContent = fortune.element;
            document.getElementById('zodiac').textContent = fortune.zodiac;
            document.getElementById('matchRate').textContent = (95 + Math.random() * 5).toFixed(1) + '%';
            
            // 设置签诗和解读
            document.getElementById('poem').textContent = fortune.poem;
            document.getElementById('career').textContent = fortune.career;
            document.getElementById('love').textContent = fortune.love;
            document.getElementById('health').textContent = fortune.health;
            document.getElementById('fortune').textContent = fortune.fortune;
            
            // 保存当前运势用于分享
            window.currentFortune = fortune;
            
            hideLoading();
            document.getElementById('resultSection').classList.add('active');
        }

        // ====== 分享功能 ======
        function shareFortune() {
            const fortune = window.currentFortune;
            if (!fortune) return;
            
            // 设置分享卡片内容
            document.getElementById('shareTarotSymbol').textContent = fortune.tarotSymbol;
            document.getElementById('shareTarotName').textContent = fortune.tarot;
            const shareLevel = document.getElementById('shareLevel');
            shareLevel.textContent = fortune.level;
            shareLevel.className = 'share-card-level';
            if (fortune.level === '大吉') shareLevel.classList.add('level-daji');
            else if (fortune.level === '中吉') shareLevel.classList.add('level-zhongji');
            else shareLevel.classList.add('level-xiaoji');
            document.getElementById('sharePoem').textContent = fortune.poem;
            
            // 显示分享卡片
            document.getElementById('shareCard').classList.add('active');
        }
        
        function closeShareCard() {
            document.getElementById('shareCard').classList.remove('active');
        }
        
        function goHome() {
            document.getElementById('resultSection').classList.remove('active');
            document.getElementById('inputSection').style.display = 'block';
            window.scrollTo(0, 0);
        }

        // 初始化
        generateStars();
    </script>
</body>
</html>
