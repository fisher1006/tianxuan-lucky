<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天选上上签 - 今日运势占卜</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f4e4ba;
            --gold-dark: #aa8c2c;
            --deep-purple: #1a0a2e;
            --purple-dark: #16213e;
            --purple-light: #2d1b4e;
            --crimson: #8b0000;
            --cream: #faf8f0;
            --text-dark: #2c2416;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', 'Noto Serif SC', serif;
            min-height: 100vh;
            background: var(--deep-purple);
            color: var(--cream);
            overflow-x: hidden;
        }

        /* Starry Background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--min-opacity); transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Nebula overlay */
        .nebula {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(139, 0, 0, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(75, 0, 130, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 0 30px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 1rem;
            color: rgba(250, 248, 240, 0.6);
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* Cards */
        .card {
            background: linear-gradient(145deg, rgba(45, 27, 78, 0.9), rgba(26, 10, 46, 0.95));
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        /* Input Section */
        .input-section {
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 0.9rem;
            color: var(--gold-light);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .input-field {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            color: var(--cream);
            font-family: inherit;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 2px;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .input-field::placeholder {
            color: rgba(250, 248, 240, 0.3);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 16px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--deep-purple);
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(212, 175, 55, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: transparent;
            color: var(--gold-light);
            border: 1px solid rgba(212, 175, 55, 0.4);
            margin-top: 15px;
        }

        .btn-secondary:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: rgba(250, 248, 240, 0.3);
            font-size: 0.85rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
        }

        .divider span {
            padding: 0 15px;
        }

        /* Result Section */
        .result-section {
            display: none;
            animation: fadeInUp 0.8s ease-out;
        }

        .result-section.active {
            display: block;
        }

        /* Fortune Level */
        .fortune-level {
            text-align: center;
            margin-bottom: 25px;
        }

        .level-badge {
            display: inline-block;
            padding: 10px 30px;
            font-size: 1.5rem;
            font-weight: 700;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--deep-purple);
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4); }
            50% { box-shadow: 0 4px 40px rgba(212, 175, 55, 0.6); }
        }

        .level-daji { background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%); }
        .level-zhongji { background: linear-gradient(135deg, #c0c0c0 0%, #808080 100%); }
        .level-xiaoji { background: linear-gradient(135deg, #cd7f32 0%, #8b4513 100%); }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: rgba(250, 248, 240, 0.5);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gold-light);
        }

        /* Tarot Card */
        .tarot-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .tarot-card {
            display: inline-block;
            width: 140px;
            height: 200px;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 15px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: cardFloat 3s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .tarot-card-inner {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--purple-dark), var(--purple-light));
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .tarot-symbol {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .tarot-name {
            font-size: 1rem;
            color: var(--gold-light);
            font-weight: 600;
        }

        .tarot-label {
            font-size: 0.7rem;
            color: rgba(250, 248, 240, 0.5);
            margin-top: 8px;
        }

        /* Poem */
        .poem-section {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
        }

        .poem-title {
            font-size: 0.85rem;
            color: var(--gold);
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .poem-text {
            font-size: 1.15rem;
            color: var(--cream);
            line-height: 1.8;
            font-weight: 500;
        }

        /* Detailed Readings */
        .readings-section {
            margin-bottom: 25px;
        }

        .readings-title {
            font-size: 1rem;
            color: var(--gold);
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 2px;
        }

        .reading-item {
            background: rgba(0, 0, 0, 0.15);
            border-left: 3px solid var(--gold);
            border-radius: 0 10px 10px 0;
            padding: 15px 18px;
            margin-bottom: 12px;
        }

        .reading-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .reading-icon {
            font-size: 1.2rem;
            margin-right: 10px;
        }

        .reading-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gold-light);
        }

        .reading-text {
            font-size: 0.9rem;
            color: rgba(250, 248, 240, 0.8);
            line-height: 1.6;
        }

        /* Share Section */
        .share-section {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
        }

        .invite-code {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 3px;
            margin-bottom: 15px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            display: inline-block;
        }

        .share-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-share {
            flex: 1;
            min-width: 120px;
            max-width: 180px;
            padding: 12px 15px;
            font-size: 0.9rem;
        }

        /* Community Section */
        .community-section {
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .community-title {
            font-size: 0.9rem;
            color: rgba(250, 248, 240, 0.5);
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .community-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .community-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .community-item:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateY(-2px);
        }

        .community-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--cream);
            margin-bottom: 4px;
        }

        .community-info {
            font-size: 0.7rem;
            color: rgba(250, 248, 240, 0.5);
        }

        .refresh-btn {
            text-align: center;
            margin-top: 15px;
            color: var(--gold-light);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            color: var(--gold);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 0;
            color: rgba(250, 248, 240, 0.25);
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        /* Loading Animation */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .loading-text {
            font-size: 1.1rem;
            color: var(--gold-light);
            margin-bottom: 20px;
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .loading-dot {
            width: 10px;
            height: 10px;
            background: var(--gold);
            border-radius: 50%;
            animation: loadingBounce 1.4s ease-in-out infinite;
        }

        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes loadingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Shake Animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .container {
                padding-left: 12px;
                padding-right: 12px;
            }

            .title {
                font-size: 1.8rem;
                letter-spacing: 2px;
            }

            .subtitle {
                font-size: 0.85rem;
            }

            .card {
                width: 100%;
                padding: 20px;
                border-radius: 16px;
                overflow-x: hidden;
            }

            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .stat-item {
                padding: 12px 8px;
            }

            .stat-value {
                font-size: 0.9rem;
            }

            .tarot-card {
                width: 120px;
                height: 170px;
            }

            .community-grid {
                grid-template-columns: 1fr;
            }

            .btn {
                padding: 14px 20px;
                font-size: 1rem;
            }

            body {
                overflow-x: hidden;
            }
        }
    </style>
</head>

                <!-- Poem -->

                <!-- Detailed Readings -->
                <div class="readings-section">

                    <div class="reading-item">
                        <div class="reading-header">
                            <span class="reading-icon">💼</span>
                            <span class="reading-label">事业</span>
                        </div>

                    </div>

                    <div class="reading-item">
                        <div class="reading-header">
                            <span class="reading-icon">💕</span>
                            <span class="reading-label">爱情</span>
                        </div>

                    </div>

                    <div class="reading-item">
                        <div class="reading-header">
                            <span class="reading-icon">❤️</span>
                            <span class="reading-label">健康</span>
                        </div>
                        <div class="reading-text" id="health">健康良好，注意休息...</div>
                    </div>

                    <div class="reading-item">
                        <div class="reading-header">
                            <span class="reading-icon">💰</span>
                            <span class="reading-label">财运</span>
                        </div>
                        <div class="reading-text" id="fortune">财运亨通，投资有收获...</div>
                    </div>
                </div>

                <!-- Share Section -->
                <div class="share-section">
                    <div class="invite-code" id="inviteCodeDisplay">ABC12345</div>
                    <div class="share-btns">
                        <button class="btn btn-primary btn-share" id="copyLinkBtn">复制链接</button>
                        <button class="btn btn-secondary btn-share" id="shareBtn">分享给朋友</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <button class="btn btn-secondary" id="drawAgainBtn">再抽一次</button>
            </div>
        </section>

        <!-- Community Section -->
        <section class="card community-section" id="communitySection">
            <div class="community-title">✦ 他们抽到了什么 ✦</div>
            <div class="community-grid" id="communityGrid">
                <!-- Dynamic content -->
            </div>
            <div class="refresh-btn" id="refreshCommunity">换一批 ↻</div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>星辰指引 · 仅供参考 · 娱乐而已</p>
        </footer>
    </div>

                fortune: "收支平衡！财务状况稳定，保持平衡。不宜冒进，也不过于保守。"
            }
        ];

        // ====== TAROT DATA ======
        const tarotCards = [
            { name: "愚人", symbol: "🃏" }, { name: "魔术师", symbol: "🎩" }, { name: "女祭司", symbol: "📚" },
            { name: "皇后", symbol: "👸" }, { name: "皇帝", symbol: "👑" }, { name: "教皇", symbol: "📿" },
            { name: "恋人", symbol: "💑" }, { name: "战车", symbol: "🛡️" }, { name: "力量", symbol: "💪" },
            { name: "隐士", symbol: "🧙" }, { name: "命运之轮", symbol: "🎡" }, { name: "正义", symbol: "⚖️" },
            { name: "倒吊人", symbol: "🧘" }, { name: "死亡", symbol: "💀" }, { name: "节制", symbol: "🏺" },
            { name: "恶魔", symbol: "😈" }, { name: "塔", symbol: "🗼" }, { name: "星星", symbol: "⭐" },
            { name: "月亮", symbol: "🌙" }, { name: "太阳", symbol: "☀️" }, { name: "审判", symbol: "⚖️" },
            { name: "世界", symbol: "🌍" }
        ];

        // ====== COMMUNITY DATA ======
        const communityNames = [
            "北京", "上海", "广州", "深圳", "杭州", "成都", "武汉", "西安",
            "南京", "苏州", "重庆", "天津", "青岛", "长沙", "郑州", "济南"
        ];

        // ====== UTILITY FUNCTIONS ======
        function generateStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 150;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--min-opacity', Math.random() * 0.3 + 0.2);
                star.style.animationDelay = Math.random() * 5 + 's';
                starsContainer.appendChild(star);
            }
        }

        function generateInviteCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 8; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        function encodeFortune(fortuneIndex) {
            // Simple encoding: convert index to base36 and pad
            return fortuneIndex.toString(36).toUpperCase().padStart(2, '0');
        }

        function decodeInviteCode(code) {
            // Decode: extract fortune index from code
            if (!code || code.length < 2) return null;
            const encoded = code.substring(0, 2);
            return parseInt(encoded, 36);
        }

        function saveToLocalStorage(code, fortune) {
            let history = JSON.parse(localStorage.getItem('fortune_history') || '[]');
            history.unshift({ code, fortune, timestamp: Date.now() });
            // Keep only last 50 records
            history = history.slice(0, 50);
            localStorage.setItem('fortune_history', JSON.stringify(history));
            
            // Save my own code
            localStorage.setItem('my_fortune_code', code);
            localStorage.setItem('my_fortune', JSON.stringify(fortune));
        }

        function getRandomFortune() {
            const index = Math.floor(Math.random() * fortunes.length);
            return { ...fortunes[index], index };
        }

        function getRandomCommunity() {
            const fortune = getRandomFortune();
            const name = communityNames[Math.floor(Math.random() * communityNames.length)];
            const matchRate = (95 + Math.random() * 5).toFixed(1);
            return { fortune, name, matchRate };
        }

        function displayFortune(fortune) {
            // Level badge
            const levelBadge = document.getElementById('levelBadge');
            levelBadge.textContent = fortune.level;
            levelBadge.className = 'level-badge';
            if (fortune.level === '大吉') levelBadge.classList.add('level-daji');
            else if (fortune.level === '中吉') levelBadge.classList.add('level-zhongji');
            else levelBadge.classList.add('level-xiaoji');

            // Stats
            document.getElementById('element').textContent = fortune.element;
            document.getElementById('zodiac').textContent = fortune.zodiac;
            document.getElementById('matchRate').textContent = (95 + Math.random() * 5).toFixed(1) + '%';

            // Tarot
            document.getElementById('tarotSymbol').textContent = fortune.tarotSymbol || '🃏';
            document.getElementById('tarotName').textContent = fortune.tarot;

            // Poem
            document.getElementById('poem').textContent = fortune.poem;

            // Readings
            document.getElementById('career').textContent = fortune.career;
            document.getElementById('love').textContent = fortune.love;
            document.getElementById('health').textContent = fortune.health;
            document.getElementById('fortune').textContent = fortune.fortune;
        }

        function displayCommunity() {
            const grid = document.getElementById('communityGrid');
            grid.innerHTML = '';
            
            for (let i = 0; i < 4; i++) {
                const item = getRandomCommunity();
                const div = document.createElement('div');
                div.className = 'community-item';
                div.innerHTML = `
                    <div class="community-name">${item.name}</div>
                    <div class="community-info">${item.fortune.level} · ${item.fortune.element}行 · ${item.fortune.zodiac} · ${item.fortune.tarot}</div>
                `;
                div.onclick = () => viewCommunityFortune(item);
                grid.appendChild(div);
            }
        }

        function viewCommunityFortune(item) {
            const inviteCode = generateInviteCode() + encodeFortune(item.fortune.index);
            showResult(item.fortune, inviteCode);
        }

        function showLoading() {
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('communitySection').style.display = 'none';
            document.getElementById('loading').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }

        function showResult(fortune, inviteCode) {
            displayFortune(fortune);
            document.getElementById('inviteCodeDisplay').textContent = inviteCode;
            document.getElementById('resultSection').classList.add('active');
            hideLoading();
        }

        function hideResult() {
            document.getElementById('resultSection').classList.remove('active');
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('communitySection').style.display = 'block';
            document.getElementById('inviteCode').value = '';
            document.getElementById('startBtn').disabled = true;
        }

        function drawFortune() {
            showLoading();
            
            // Simulate loading animation
            setTimeout(() => {
                const fortune = getRandomFortune();
                const inviteCode = generateInviteCode() + encodeFortune(fortune.index);
                
                saveToLocalStorage(inviteCode, fortune);
                showResult(fortune, inviteCode);
            }, 2000);
        }

        function viewByInviteCode(code) {
            if (!code || code.length < 4) {
                alert('请输入有效的邀请码');
                return;
            }

            // Try to find in history
            const history = JSON.parse(localStorage.getItem('fortune_history') || '[]');
            const found = history.find(h => h.code === code);
            
            if (found) {
                showLoading();
                setTimeout(() => {
                    showResult(found.fortune, found.code);
                }, 1500);
                return;
            }

            // Try decode
            const decodedIndex = decodeInviteCode(code);
            if (decodedIndex !== null && decodedIndex >= 0 && decodedIndex < fortunes.length) {
                showLoading();
                setTimeout(() => {
                    showResult(fortunes[decodedIndex], code);
                }, 1500);
                return;
            }

            // Not found
            document.getElementById('inviteCode').classList.add('shake');
            setTimeout(() => {
                document.getElementById('inviteCode').classList.remove('shake');
            }, 500);
            alert('未找到该邀请码对应的结果，请检查后重试');
        }

        function copyLink() {
            const code = document.getElementById('inviteCodeDisplay').textContent;
            const url = window.location.origin + window.location.pathname + '?code=' + code;
            
            navigator.clipboard.writeText(url).then(() => {
                alert('链接已复制到剪贴板！');
            }).catch(() => {
                // Fallback
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                alert('链接已复制到剪贴板！');
            });
        }

        function shareToFriend() {
            const code = document.getElementById('inviteCodeDisplay').textContent;
            const level = document.getElementById('levelBadge').textContent;
            const element = document.getElementById('element').textContent;
            const zodiac = document.getElementById('zodiac').textContent;
            
            const text = `🎯 我的天选上上签：${level}\n🌟 五行：${element}\n✨ 幸运星座：${zodiac}\n\n你的今日运势是什么？戳链接查看：`;
            const url = window.location.origin + window.location.pathname + '?code=' + code;
            
            if (navigator.share) {
                navigator.share({
                    title: '天选上上签',
                    text: text,
                    url: url
                });
            } else {
                copyLink();
            }
        }

        // ====== INITIALIZATION ======
        document.addEventListener('DOMContentLoaded', () => {
            generateStars();
            displayCommunity();

            // Check URL params for invite code
            const urlParams = new URLSearchParams(window.location.search);
            const codeParam = urlParams.get('code');
            
            if (codeParam) {
                showLoading();
                setTimeout(() => {
                    viewByInviteCode(codeParam);
                }, 500);
            }

            // Input validation
            const inviteInput = document.getElementById('inviteCode');
            const startBtn = document.getElementById('startBtn');
            
            inviteInput.addEventListener('input', () => {
                startBtn.disabled = inviteInput.value.length < 4;
            });

            // Event listeners
            document.getElementById('startBtn').addEventListener('click', () => {
                viewByInviteCode(inviteInput.value.trim());
            });

            document.getElementById('drawBtn').addEventListener('click', drawFortune);
            document.getElementById('drawAgainBtn').addEventListener('click', () => {
                hideResult();
                setTimeout(drawFortune, 300);
            });

            document.getElementById('copyLinkBtn').addEventListener('click', copyLink);
            document.getElementById('shareBtn').addEventListener('click', shareToFriend);
            document.getElementById('refreshCommunity').addEventListener('click', displayCommunity);

            // Enter key to start
            inviteInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !startBtn.disabled) {
                    startBtn.click();
                }
            });
        });
    </script>
</body>
</html>
